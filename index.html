<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Salão Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f7f7f5;min-height:100vh}
input,textarea{font-family:inherit;font-size:14px;border:0.5px solid #ddd;border-radius:8px;padding:8px 12px;outline:none;background:#fff;width:100%}
input:focus,textarea:focus{border-color:#1D9E75}
select{font-family:inherit;font-size:14px;border:0.5px solid #ddd;border-radius:8px;padding:8px 12px;outline:none;background:#fff;width:100%}
button{font-family:inherit;cursor:pointer}
.btn-p{padding:9px 20px;background:#1D9E75;border:none;color:#fff;border-radius:9px;font-size:13px;font-weight:600}
.btn-s{padding:9px 16px;background:#fff;border:0.5px solid #ddd;border-radius:9px;font-size:13px;color:#555}
.btn-d{padding:4px 10px;background:transparent;border:0.5px solid #ffaaaa;border-radius:6px;font-size:12px;color:#993C1D}
.topbar{background:#fff;border-bottom:0.5px solid #e5e5e5;padding:0.7rem 1.2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.nav{background:#fff;border-bottom:0.5px solid #e5e5e5;display:flex;overflow-x:auto}
.nav button{padding:11px 18px;font-size:13px;background:none;border:none;border-bottom:2px solid transparent;color:#888;cursor:pointer;white-space:nowrap;font-family:inherit}
.nav button.active{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:500}
.content{padding:1.2rem;max-width:900px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.card{background:#fff;border:0.5px solid #e5e5e5;border-radius:12px;padding:1rem;cursor:pointer;transition:box-shadow 0.15s}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:#333;flex-shrink:0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.42);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;overflow-y:auto}
.modal{background:#fff;border-radius:16px;border:0.5px solid #e5e5e5;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:1.5rem;margin:auto}
.field{margin-bottom:14px}
.field label{font-size:13px;color:#777;display:block;margin-bottom:4px}
.meta-box{background:#f5f5f5;border-radius:8px;padding:8px 12px}
.meta-lbl{font-size:11px;color:#aaa;margin-bottom:2px}
.meta-val{font-size:13px;font-weight:500}
.alert-bday{background:#FAEEDA;border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.alert-inactive{background:#FAECE7;border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0;display:block}
.sess-item{background:#f7f7f7;border-radius:10px;padding:10px 14px;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hidden{display:none!important}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-card{background:#fff;border:0.5px solid #e5e5e5;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:360px;box-shadow:0 2px 24px rgba(0,0,0,0.07)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.5);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
#loading{position:fixed;inset:0;background:#f7f7f5;z-index:999;display:flex;align-items:center;justify-content:center;gap:12px;font-size:14px;color:#777}
</style>
</head>
<body>

<div id="loading">
  <div style="width:28px;height:28px;border:3px solid #1D9E75;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite"></div>
  Carregando...
</div>

<div id="login-screen" class="hidden">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:24px">
      <div style="width:56px;height:56px;border-radius:50%;background:#1D9E75;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M9 11.75a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5zm6 0a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8 0-.3.02-.58.05-.87 2.36-1.04 4.23-2.97 5.21-5.36C11.07 8.33 13.05 9.5 15.2 10c.96.23 1.97.32 3 .2.06.26.1.53.12.8H18c0 4.41-3.59 8-6 8z"/></svg>
      </div>
      <h1 style="font-size:22px;font-weight:700;color:#111">Salão Pro</h1>
      <p style="font-size:13px;color:#888;margin-top:4px">Gestão de coloração capilar</p>
    </div>
    <div id="form-login">
      <div class="field"><label>E-mail</label><input id="l-email" type="email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <div class="field"><label>Senha</label><input id="l-pass" type="password" placeholder="Sua senha" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <p id="l-err" class="hidden" style="font-size:12px;color:#D85A30;text-align:center;margin-bottom:8px"></p>
      <button class="btn-p" id="btn-login" style="width:100%;padding:11px 0;font-size:14px" onclick="doLogin()">Entrar</button>
      <p style="text-align:center;font-size:13px;color:#888;margin-top:16px">Não tem conta? <a href="#" onclick="toggleForm(true)" style="color:#1D9E75;text-decoration:none;font-weight:500">Cadastrar</a></p>
    </div>
    <div id="form-reg" class="hidden">
      <div class="field"><label>Nome completo</label><input id="r-nome" placeholder="Seu nome"/></div>
      <div class="field"><label>E-mail</label><input id="r-email" type="email" placeholder="seu@email.com"/></div>
      <div class="field"><label>Senha</label><input id="r-pass" type="password" placeholder="Mínimo 6 caracteres"/></div>
      <div class="field"><label>Perfil</label>
        <select id="r-role" onchange="toggleCodeField()">
          <option value="aux">Auxiliar — somente visualizar</option>
          <option value="pro">Profissional — acesso completo</option>
        </select>
      </div>
      <div id="code-field" class="field hidden">
        <label>Código de acesso profissional</label>
        <input id="r-code" placeholder="Solicite o código à proprietária"/>
        <p style="font-size:11px;color:#aaa;margin-top:4px">Necessário para perfil de profissional</p>
      </div>
      <p id="r-err" class="hidden" style="font-size:12px;color:#D85A30;text-align:center;margin-bottom:8px"></p>
      <button class="btn-p" id="btn-reg" style="width:100%;padding:11px 0;font-size:14px" onclick="doRegister()">Criar conta</button>
      <p style="text-align:center;font-size:13px;color:#888;margin-top:16px">Já tem conta? <a href="#" onclick="toggleForm(false)" style="color:#1D9E75;text-decoration:none;font-weight:500">Entrar</a></p>
    </div>
  </div>
</div>

<div id="main-screen" class="hidden">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:34px;height:34px;border-radius:50%;background:#1D9E75;display:flex;align-items:center;justify-content:center">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M9 11.75a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5zm6 0a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8 0-.3.02-.58.05-.87 2.36-1.04 4.23-2.97 5.21-5.36C11.07 8.33 13.05 9.5 15.2 10c.96.23 1.97.32 3 .2.06.26.1.53.12.8H18c0 4.41-3.59 8-6 8z"/></svg>
      </div>
      <span style="font-size:16px;font-weight:600;color:#111">Salão Pro</span>
      <span id="role-badge" style="font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500"></span>
    </div>
    <button class="btn-s" style="font-size:12px;padding:5px 14px" onclick="doLogout()">Sair</button>
  </div>
  <div class="nav">
    <button class="active" onclick="showTab('clientes',this)">Clientes</button>
    <button onclick="showTab('alertas',this)">Alertas <span id="alert-badge" class="hidden" style="background:#D85A30;color:#fff;border-radius:99px;font-size:10px;padding:1px 6px;margin-left:4px"></span></button>
    <button id="nav-nova" onclick="showTab('nova',this)">Nova cliente</button>
    <button id="nav-cores" onclick="showTab('cores',this)">Cores</button>
  </div>
  <div class="content">
    <div id="tab-clientes">
      <div id="readonly-msg" class="hidden" style="background:#E6F1FB;color:#185FA5;font-size:12px;padding:7px 12px;border-radius:8px;margin-bottom:12px">Modo visualização — você pode ver mas não editar</div>
      <input id="search" placeholder="Buscar por nome ou telefone..." oninput="renderClients()" style="margin-bottom:14px"/>
      <div id="client-grid" class="grid"></div>
    </div>
    <div id="tab-alertas" class="hidden"></div>
    <div id="tab-nova" class="hidden">
      <p style="font-size:13px;color:#888;margin-bottom:16px">Cadastrar nova cliente</p>
      <div class="g2">
        <div class="field"><label>Nome completo</label><input id="nc-nome"/></div>
        <div class="field"><label>Telefone</label><input id="nc-tel" placeholder="(11) 99999-9999"/></div>
      </div>
      <div class="g2">
        <div class="field"><label>Nascimento</label><input id="nc-nasc" type="date"/></div>
        <div class="field"><label>E-mail</label><input id="nc-email" type="email"/></div>
      </div>
      <div class="field"><label>Observações</label><textarea id="nc-obs" style="height:80px;resize:vertical" placeholder="Alergias, preferências..."></textarea></div>
      <button class="btn-p" style="width:100%;padding:11px 0;font-size:14px" onclick="saveNewClient()">Cadastrar cliente</button>
      <p id="nc-msg" class="hidden" style="color:#0F6E56;font-size:13px;margin-top:10px"></p>
    </div>
    <div id="tab-cores" class="hidden">
      <p style="font-size:13px;color:#888;margin-bottom:12px">Cores e produtos do salão</p>
      <div id="cores-list"></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <input id="nova-cor" placeholder="Nova cor ou produto..." style="flex:1"/>
        <button class="btn-s" onclick="addCor()">Adicionar</button>
      </div>
    </div>
  </div>
</div>

<div id="modal-client" class="overlay hidden" onclick="if(event.target===this)closeModal('modal-client')">
  <div class="modal">
    <div id="modal-client-body"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
      <button class="btn-s" onclick="closeModal('modal-client')">Fechar</button>
      <button class="btn-p" id="btn-add-sess" onclick="openSession()">+ Sessão</button>
    </div>
  </div>
</div>

<div id="modal-session" class="overlay hidden" onclick="if(event.target===this)closeModal('modal-session')">
  <div class="modal">
    <h3 style="font-size:16px;font-weight:500;margin-bottom:16px">Registrar sessão</h3>
    <div class="field"><label>Data</label><input id="sess-date" type="date"/></div>
    <div class="field"><label>Cores usadas</label>
      <div style="border:0.5px solid #ddd;border-radius:10px;padding:12px">
        <div id="sess-tags" style="display:flex;flex-wrap:wrap;gap:5px;min-height:30px;margin-bottom:10px"></div>
        <div style="display:flex;gap:8px">
          <input id="sess-col-inp" list="cat-list" placeholder="Cor ou produto..." style="flex:1" onkeydown="if(event.key==='Enter')addSessColor()"/>
          <datalist id="cat-list"></datalist>
          <button class="btn-s" onclick="addSessColor()">+</button>
        </div>
      </div>
    </div>
    <div class="field"><label>Observações</label><textarea id="sess-notes" style="height:80px;resize:vertical" placeholder="Técnica, resultado..."></textarea></div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
      <button class="btn-s" onclick="closeModal('modal-session')">Cancelar</button>
      <button class="btn-p" onclick="saveSession()">Salvar sessão</button>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,doc,addDoc,updateDoc,onSnapshot,setDoc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg={apiKey:"AIzaSyD7iOpPes0e60ColfnhulRkg-QKHlDg-iY",authDomain:"salao-pro-17519.firebaseapp.com",projectId:"salao-pro-17519",storageBucket:"salao-pro-17519.firebasestorage.app",messagingSenderId:"771780855688",appId:"1:771780855688:web:5cc873be37269a7d379c3d"};
const PRO_CODE="SALAOPRO2025";
const fbApp=initializeApp(cfg);
const auth=getAuth(fbApp);
const db=getFirestore(fbApp);

const PL=["#9FE1CB","#B5D4F4","#F5C4B3","#FAC775","#C0DD97","#F4C0D1","#CECBF6","#D3D1C7"];
const ps=n=>{const bg=PL[n.length%PL.length];return`background:${bg}33;color:#2C2C2A;border:1px solid ${bg};border-radius:99px;padding:2px 10px;font-size:12px;display:inline-block`;};
const avBg=n=>PL[n.charCodeAt(0)%PL.length];
const ini=n=>{const p=n.trim().split(" ");return p.length>=2?p[0][0]+p[1][0]:p[0].slice(0,2);};
const tStr=()=>new Date().toISOString().split("T")[0];
const dBet=(d1,d2)=>Math.floor((new Date(d2)-new Date(d1))/86400000);
const fmt=d=>{if(!d)return"—";const[y,m,dd]=d.split("-");return`${dd}/${m}/${y}`;};
const isBd=nasc=>{if(!nasc)return false;const d=new Date(nasc+"T00:00:00"),t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth();};
const lS=c=>c.sessions&&c.sessions.length?[...c.sessions].sort((a,b)=>b.date.localeCompare(a.date))[0]:null;
const $=id=>document.getElementById(id);

let cUser=null,cRole=null,clients=[],catalog=[],selC=null,sCols=[],unsubC=null,unsubK=null;

onAuthStateChanged(auth,async fu=>{
  if(fu){
    const sn=await getDoc(doc(db,"users",fu.uid));
    if(sn.exists()){cUser=fu;cRole=sn.data().role;showApp();}
    else{await signOut(auth);showLogin();}
  }else{showLogin();}
});

function showLogin(){$("loading").classList.add("hidden");$("main-screen").classList.add("hidden");$("login-screen").classList.remove("hidden");}
function showApp(){
  $("loading").classList.add("hidden");$("login-screen").classList.add("hidden");$("main-screen").classList.remove("hidden");
  const ip=cRole==="pro";
  const b=$("role-badge");b.textContent=ip?"Profissional":"Auxiliar";b.style.background=ip?"#E1F5EE":"#E6F1FB";b.style.color=ip?"#0F6E56":"#185FA5";
  $("nav-nova").style.display=ip?"":"none";$("nav-cores").style.display=ip?"":"none";
  if(!ip)$("readonly-msg").classList.remove("hidden");
  subData();
}

window.toggleForm=reg=>{$("form-login").classList.toggle("hidden",reg);$("form-reg").classList.toggle("hidden",!reg);};
window.toggleCodeField=()=>{$("code-field").classList.toggle("hidden",$("r-role").value!=="pro");};

window.doLogin=async()=>{
  const email=$("l-email").value.trim(),pass=$("l-pass").value,err=$("l-err"),btn=$("btn-login");
  if(!email||!pass){err.textContent="Preencha e-mail e senha";err.classList.remove("hidden");return;}
  btn.innerHTML='<span class="spin"></span>Entrando...';btn.disabled=true;
  try{await signInWithEmailAndPassword(auth,email,pass);err.classList.add("hidden");}
  catch(e){err.textContent=e.code==="auth/invalid-credential"?"E-mail ou senha incorretos":"Erro ao entrar. Tente novamente.";err.classList.remove("hidden");}
  btn.innerHTML="Entrar";btn.disabled=false;
};

window.doRegister=async()=>{
  const nome=$("r-nome").value.trim(),email=$("r-email").value.trim(),pass=$("r-pass").value,role=$("r-role").value,code=$("r-code").value.trim(),err=$("r-err"),btn=$("btn-reg");
  if(!nome||!email||!pass){err.textContent="Preencha todos os campos";err.classList.remove("hidden");return;}
  if(pass.length<6){err.textContent="Senha deve ter ao menos 6 caracteres";err.classList.remove("hidden");return;}
  if(role==="pro"&&code!==PRO_CODE){err.textContent="Código de acesso profissional inválido";err.classList.remove("hidden");return;}
  btn.innerHTML='<span class="spin"></span>Criando conta...';btn.disabled=true;
  try{const cr=await createUserWithEmailAndPassword(auth,email,pass);await setDoc(doc(db,"users",cr.user.uid),{nome,email,role});err.classList.add("hidden");}
  catch(e){err.textContent=e.code==="auth/email-already-in-use"?"E-mail já cadastrado":"Erro ao criar conta.";err.classList.remove("hidden");}
  btn.innerHTML="Criar conta";btn.disabled=false;
};

window.doLogout=async()=>{if(unsubC)unsubC();if(unsubK)unsubK();clients=[];catalog=[];await signOut(auth);};

function subData(){
  unsubC=onSnapshot(collection(db,"clients"),sn=>{clients=sn.docs.map(d=>({id:d.id,...d.data()}));renderClients();renderAlerts();});
  unsubK=onSnapshot(doc(db,"catalog","items"),sn=>{catalog=sn.exists()?(sn.data().list||[]):[];renderCores();updCat();});
}

window.showTab=(id,btn)=>{["clientes","alertas","nova","cores"].forEach(t=>$("tab-"+t).classList.add("hidden"));document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));$("tab-"+id).classList.remove("hidden");btn.classList.add("active");};

window.renderClients=()=>{
  const q=($("search").value||"").toLowerCase(),grid=$("client-grid");
  const fl=clients.filter(c=>c.nome.toLowerCase().includes(q)||c.tel.includes(q));
  if(!fl.length){grid.innerHTML='<p style="text-align:center;color:#bbb;padding:3rem 0;font-size:13px">Nenhuma cliente encontrada</p>';return;}
  grid.innerHTML=fl.map(c=>{
    const l=lS(c),days=l?dBet(l.date,tStr()):999,inactive=days>=30,bday=isBd(c.nasc);
    const bl=inactive?"3px solid #D85A30":bday?"3px solid #BA7517":"0.5px solid #e5e5e5";
    const bc=inactive?"#F09595":bday?"#FAC775":"#e5e5e5";
    const pills=(l?l.colors.slice(0,3):[]).map(col=>`<span style="${ps(col)}">${col}</span>`).join("");
    return`<div class="card" style="border:0.5px solid ${bc};border-left:${bl}" onclick="openClient('${c.id}')">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div class="avatar" style="background:${avBg(c.nome)}33">${ini(c.nome)}</div>
        <div><div style="font-size:14px;font-weight:500;color:#111">${c.nome}</div><div style="font-size:12px;color:#888">${c.tel}</div></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">${pills}</div>
      <div style="font-size:11px;color:#bbb">${l?`Última sessão: ${fmt(l.date)} (${days} dias)`:"Sem sessões"}</div>
    </div>`;
  }).join("");
};

window.renderAlerts=()=>{
  const today=tStr(),bd=clients.filter(c=>isBd(c.nasc)),ia=clients.filter(c=>{const l=lS(c);return l?dBet(l.date,today)>=30:true;});
  const cnt=bd.length+ia.length,badge=$("alert-badge");
  cnt>0?(badge.textContent=cnt,badge.classList.remove("hidden")):badge.classList.add("hidden");
  let h="";
  if(!bd.length&&!ia.length)h='<p style="text-align:center;color:#bbb;padding:3rem 0;font-size:13px">Nenhum alerta no momento ✓</p>';
  if(bd.length){h+=`<p style="font-size:13px;font-weight:500;margin-bottom:8px;color:#111">Aniversariantes hoje</p>`;h+=bd.map(c=>`<div class="alert-bday"><div class="dot" style="background:#BA7517"></div><div><b style="color:#633806;font-size:13px">${c.nome}</b><br><span style="font-size:12px;color:#854F0B">Aniversário hoje — ${fmt(c.nasc)}</span></div></div>`).join("");}
  if(ia.length){h+=`<p style="font-size:13px;font-weight:500;margin-bottom:8px;margin-top:${bd.length?16:0}px;color:#111">Clientes inativas (+30 dias)</p>`;h+=ia.map(c=>{const l=lS(c),days=l?dBet(l.date,today):null;return`<div class="alert-inactive"><div class="dot" style="background:#993C1D"></div><div><b style="color:#4A1B0C;font-size:13px">${c.nome}</b><br><span style="font-size:12px;color:#712B13">Última visita: ${l?fmt(l.date):"nunca"}${days!==null?` (${days} dias)`:""}</span></div></div>`;}).join("");}
  $("tab-alertas").innerHTML=h;
};

window.renderCores=()=>{const ip=cRole==="pro";$("cores-list").innerHTML=catalog.map((cor,i)=>`<div style="display:flex;align-items:center;justify-content:space-between;background:#f5f5f5;border-radius:8px;padding:7px 12px;margin-bottom:5px"><span style="${ps(cor)}">${cor}</span>${ip?`<button class="btn-d" onclick="removeCor(${i})">Remover</button>`:""}</div>`).join("");};
window.addCor=async()=>{const inp=$("nova-cor"),v=inp.value.trim();if(!v||catalog.includes(v))return;await setDoc(doc(db,"catalog","items"),{list:[...catalog,v]});inp.value="";};
window.removeCor=async i=>{await setDoc(doc(db,"catalog","items"),{list:catalog.filter((_,idx)=>idx!==i)});};
window.updCat=()=>{$("cat-list").innerHTML=catalog.map(c=>`<option value="${c}">`).join("");};

window.openClient=id=>{
  selC=clients.find(c=>c.id===id);if(!selC)return;
  const l=lS(selC),days=l?dBet(l.date,tStr()):null;
  const ac=[...new Set((selC.sessions||[]).flatMap(s=>s.colors))];
  const bb=isBd(selC.nasc)?`<span style="font-size:11px;padding:2px 10px;border-radius:99px;background:#FAEEDA;color:#633806;margin-left:8px">Aniversário hoje!</span>`:"";
  const hist=[...(selC.sessions||[])].sort((a,b)=>b.date.localeCompare(a.date)).map(s=>`<div class="sess-item"><span style="font-size:13px;font-weight:500">${fmt(s.date)}</span><div style="display:flex;flex-wrap:wrap;gap:4px;margin:6px 0 4px">${s.colors.map(col=>`<span style="${ps(col)}">${col}</span>`).join("")}</div>${s.notes?`<p style="font-size:12px;color:#888;margin:0">${s.notes}</p>`:""}</div>`).join("");
  $("modal-client-body").innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div class="avatar" style="width:48px;height:48px;font-size:17px;background:${avBg(selC.nome)}33">${ini(selC.nome)}</div>
      <div><h3 style="font-size:17px;font-weight:500;margin:0;display:flex;align-items:center;flex-wrap:wrap;gap:6px">${selC.nome}${bb}</h3><p style="font-size:13px;color:#888;margin:0">${selC.tel}${selC.email?" · "+selC.email:""}</p></div>
    </div>
    <div class="g2" style="margin-bottom:14px">
      <div class="meta-box"><div class="meta-lbl">Nascimento</div><div class="meta-val">${selC.nasc?fmt(selC.nasc):"—"}</div></div>
      <div class="meta-box"><div class="meta-lbl">Última sessão</div><div class="meta-val">${l?`${fmt(l.date)} (${days}d)`:"Sem sessões"}</div></div>
    </div>
    ${selC.obs?`<div style="background:#f5f5f5;border-radius:8px;padding:8px 12px;margin-bottom:14px;font-size:12px;color:#777">Obs: ${selC.obs}</div>`:""}
    ${ac.length?`<p style="font-size:11px;font-weight:500;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Cores já utilizadas</p><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px">${ac.map(col=>`<span style="${ps(col)}">${col}</span>`).join("")}</div>`:""}
    <p style="font-size:11px;font-weight:500;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Histórico de sessões</p>
    ${hist||'<p style="font-size:13px;color:#bbb">Sem sessões registradas</p>'}`;
  $("btn-add-sess").style.display=cRole==="pro"?"":"none";
  $("modal-client").classList.remove("hidden");
};

window.closeModal=id=>$(id).classList.add("hidden");

window.openSession=()=>{$("sess-date").value=tStr();$("sess-notes").value="";$("sess-col-inp").value="";sCols=[];renderST();$("modal-session").classList.remove("hidden");};
window.addSessColor=()=>{const inp=$("sess-col-inp"),v=inp.value.trim();if(v&&!sCols.includes(v)){sCols.push(v);renderST();}inp.value="";};
window.removeSC=i=>{sCols.splice(i,1);renderST();};
window.renderST=()=>{$("sess-tags").innerHTML=sCols.map((col,i)=>`<span style="${ps(col)};display:inline-flex;align-items:center;gap:4px">${col}<button onclick="removeSC(${i})" style="background:none;border:none;cursor:pointer;font-size:15px;line-height:1;padding:0;color:#888">×</button></span>`).join("");};

window.saveSession=async()=>{
  const date=$("sess-date").value,notes=$("sess-notes").value.trim();
  if(!date||!sCols.length){alert("Informe a data e ao menos uma cor");return;}
  await updateDoc(doc(db,"clients",selC.id),{sessions:[...(selC.sessions||[]),{date,colors:[...sCols],notes}]});
  closeModal("modal-session");closeModal("modal-client");
};

window.saveNewClient=async()=>{
  const nome=$("nc-nome").value.trim(),tel=$("nc-tel").value.trim(),nasc=$("nc-nasc").value,email=$("nc-email").value.trim(),obs=$("nc-obs").value.trim();
  if(!nome||!tel){alert("Nome e telefone são obrigatórios");return;}
  await addDoc(collection(db,"clients"),{nome,tel,nasc,email,obs,sessions:[]});
  ["nc-nome","nc-tel","nc-nasc","nc-email","nc-obs"].forEach(id=>$(id).value="");
  const msg=$("nc-msg");msg.textContent=`"${nome}" cadastrada com sucesso!`;msg.classList.remove("hidden");setTimeout(()=>msg.classList.add("hidden"),3000);
};
</script>
</body>
</html>
